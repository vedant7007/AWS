<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Pen tool / bezier -->
  <g transform="translate(15,15)" opacity="0.9">
    <path d="M0,40 C0,10 20,0 40,0" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="0" cy="40" r="4" fill="white"/>
    <circle cx="40" cy="0" r="4" fill="white"/>
    <line x1="0" y1="40" x2="0" y2="15" stroke="white" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="40" y1="0" x2="20" y2="0" stroke="white" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="0" cy="15" r="2.5" fill="white" opacity="0.6"/>
    <circle cx="20" cy="0" r="2.5" fill="white" opacity="0.6"/>
  </g>
  <!-- Paintbrush -->
  <g transform="translate(110,20)" opacity="0.7">
    <rect x="12" y="22" width="8" height="28" rx="1" fill="none" stroke="white" stroke-width="2"/>
    <path d="M10,22 Q16,-5 22,22" fill="none" stroke="white" stroke-width="2"/>
    <line x1="12" y1="30" x2="20" y2="30" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Color palette circle -->
  <g transform="translate(40,90)" opacity="0.8">
    <circle cx="22" cy="22" r="20" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="14" cy="14" r="4" fill="white" opacity="0.8"/>
    <circle cx="30" cy="14" r="3.5" fill="white" opacity="0.6"/>
    <circle cx="14" cy="30" r="3" fill="white" opacity="0.5"/>
    <circle cx="28" cy="28" r="4.5" fill="white" opacity="0.7"/>
  </g>
  <!-- Star/sparkle -->
  <g transform="translate(120,95)" opacity="0.6">
    <path d="M15,0 L18,12 L30,15 L18,18 L15,30 L12,18 L0,15 L12,12 Z" fill="white"/>
  </g>
  <!-- Grid/ruler -->
  <g transform="translate(20,155)" opacity="0.55">
    <rect x="0" y="0" width="40" height="40" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="20" y1="0" x2="20" y2="40" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="20" x2="40" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Dropper -->
  <g transform="translate(130,150)" opacity="0.65">
    <line x1="5" y1="35" x2="25" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="28" cy="7" r="6" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="3" cy="37" r="3" fill="white"/>
  </g>
</svg>
