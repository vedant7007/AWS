<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Megaphone -->
  <g transform="translate(10,15)" opacity="0.9">
    <path d="M10,20 L10,35 L25,35 L50,48 L50,7 L25,20 Z" fill="none" stroke="white" stroke-width="2.5"/>
    <rect x="0" y="20" width="10" height="15" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <line x1="13" y1="35" x2="18" y2="48" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Trending up arrow -->
  <g transform="translate(105,20)" opacity="0.7">
    <polyline points="0,35 15,20 30,28 50,5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="35,5 50,5 50,20" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Hashtag -->
  <g transform="translate(35,90)" opacity="0.8">
    <line x1="12" y1="0" x2="8" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="0" x2="24" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="2" y1="13" x2="35" y2="13" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="27" x2="33" y2="27" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Target/bullseye -->
  <g transform="translate(115,95)" opacity="0.6">
    <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="20" cy="20" r="10" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="20" cy="20" r="3" fill="white"/>
  </g>
  <!-- Bar chart -->
  <g transform="translate(30,155)" opacity="0.6">
    <rect x="0" y="20" width="8" height="20" fill="white" opacity="0.7"/>
    <rect x="12" y="10" width="8" height="30" fill="white" opacity="0.8"/>
    <rect x="24" y="0" width="8" height="40" fill="white" opacity="0.9"/>
    <rect x="36" y="15" width="8" height="25" fill="white" opacity="0.75"/>
  </g>
  <!-- At symbol -->
  <g transform="translate(120,155)" opacity="0.55">
    <circle cx="18" cy="18" r="16" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="18" cy="18" r="7" fill="none" stroke="white" stroke-width="2"/>
    <path d="M25,18 Q25,30 32,28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
