<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Camera -->
  <g transform="translate(15,20)" opacity="0.9">
    <rect x="0" y="10" width="50" height="34" rx="4" fill="none" stroke="white" stroke-width="2.5"/>
    <path d="M15,10 L20,0 L35,0 L40,10" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="25" cy="27" r="10" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="25" cy="27" r="4" fill="white" opacity="0.5"/>
  </g>
  <!-- Film reel -->
  <g transform="translate(110,15)" opacity="0.7">
    <circle cx="25" cy="25" r="22" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="25" cy="25" r="6" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="25" cy="8" r="3" fill="white"/>
    <circle cx="25" cy="42" r="3" fill="white"/>
    <circle cx="8" cy="25" r="3" fill="white"/>
    <circle cx="42" cy="25" r="3" fill="white"/>
  </g>
  <!-- Clapperboard -->
  <g transform="translate(30,90)" opacity="0.8">
    <rect x="0" y="12" width="45" height="30" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <path d="M0,12 L8,0 L50,0 L45,12 Z" fill="none" stroke="white" stroke-width="2"/>
    <line x1="12" y1="12" x2="18" y2="0" stroke="white" stroke-width="1.5"/>
    <line x1="24" y1="12" x2="30" y2="0" stroke="white" stroke-width="1.5"/>
    <line x1="36" y1="12" x2="42" y2="0" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Play button -->
  <g transform="translate(120,100)" opacity="0.6">
    <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2"/>
    <polygon points="15,10 15,30 32,20" fill="white"/>
  </g>
  <!-- Mic -->
  <g transform="translate(60,160)" opacity="0.6">
    <rect x="8" y="0" width="14" height="22" rx="7" fill="none" stroke="white" stroke-width="2"/>
    <path d="M2,18 Q2,32 15,32 Q28,32 28,18" fill="none" stroke="white" stroke-width="2"/>
    <line x1="15" y1="32" x2="15" y2="40" stroke="white" stroke-width="2"/>
    <line x1="8" y1="40" x2="22" y2="40" stroke="white" stroke-width="2"/>
  </g>
</svg>
